version: '3.8'

services:
  app:
    build: .
    container_name: replit_recipe_share_hub_app
    ports:
      - "5006:5000"
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/reciterecipe
      - SESSION_SECRET=super_secret_session_key
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: replit_recipe_share_hub_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=reciterecipe
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
